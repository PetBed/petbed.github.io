        }

        if (v === 'packs' && currentView !== 'packs') { packPhase = 'idle'; packCards = []; revealIdx = 0; }
        navigate(v);
      });
    });

    /* ── KONAMI CODE + DEV MODE ── */
    const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a', 'Enter'];
    let konamiIdx = 0, devMode = false;

    document.addEventListener('keydown', e => {
      if (e.key === KONAMI[konamiIdx] || e.key.toLowerCase() === KONAMI[konamiIdx]) {
        konamiIdx++;
        if (konamiIdx === KONAMI.length) { konamiIdx = 0; toggleDevMode(); }
      } else {
        konamiIdx = (e.key === KONAMI[0] || e.key.toLowerCase() === KONAMI[0]) ? 1 : 0;
      }
    });

    function toggleDevMode() {
      devMode = !devMode;
      const existing = document.getElementById('dev-overlay');
      if (existing) { existing.remove(); return; }
      if (devMode) openDevPanel();
    }

    function openDevPanel() {
      const overlay = mk('div', 'dev-overlay'); overlay.id = 'dev-overlay';
      overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); devMode = false; } });
      const panel = mk('div', 'dev-panel');

      // Header
      const hdr = mk('div', 'dev-header');
      const titles = mk('div');
      titles.appendChild(mk('div', 'dev-title', '⌗ DEV MODE'));
      titles.appendChild(mk('div', 'dev-subtitle', '↑↑↓↓←→←→BA⏎ to toggle'));
      hdr.appendChild(titles);
      const close = mk('button', 'dev-close', 'Close ✕');
      close.addEventListener('click', () => { overlay.remove(); devMode = false; });
      hdr.appendChild(close);
      panel.appendChild(hdr);

      const toast = mk('div', 'dev-toast'); toast.id = 'dev-toast';

      // Pack controls
      const packSec = mk('div', 'dev-section');
      packSec.appendChild(mk('div', 'dev-section-lbl', 'Give Packs'));
      const packBtns = mk('div', 'dev-btns');
      [['+1', 1], ['+5', 5], ['+10', 10], ['Fill (99)', 99]].forEach(([lbl, n]) => {
        const b = mk('button', 'dev-btn', lbl);
        b.addEventListener('click', () => {
          state.packsAvailable = Math.min(state.packsAvailable + n, 99);
          saveState(); updateNav();
          if (currentView === 'home') renderHome();
          if (currentView === 'packs' && packPhase === 'idle') renderPacks();
          devToast(toast, `+${n} pack${n !== 1 ? 's' : ''} granted. You now have ${state.packsAvailable}.`);
        });
        packBtns.appendChild(b);
      });
      packSec.appendChild(packBtns); panel.appendChild(packSec);

      // Points controls
      const ptsSec = mk('div', 'dev-section');
      ptsSec.appendChild(mk('div', 'dev-section-lbl', 'Points'));
      const ptsBtns = mk('div', 'dev-btns');
      [['+50', 50], ['+200', 200], ['+500', 500], ['-50', -50], ['-200', -200], ['Zero', -Infinity]].forEach(([lbl, n]) => {
        const b = mk('button', 'dev-btn' + (n < 0 ? ' danger' : ''), lbl);
        b.addEventListener('click', () => {
          if (n === -Infinity) {
            state.totalPoints = 0;
          } else {
            state.totalPoints = Math.max(0, (state.totalPoints || 0) + n);
          }
          saveState(); updateNav();
          devToast(toast, `Points now: ${state.totalPoints}`);
        });
        ptsBtns.appendChild(b);
      });
      ptsSec.appendChild(ptsBtns); panel.appendChild(ptsSec);

      // Data controls
      const dataSec = mk('div', 'dev-section');
      dataSec.appendChild(mk('div', 'dev-section-lbl', 'Data'));
      const dataBtns = mk('div', 'dev-btns');

      const clearBtn = mk('button', 'dev-btn danger', '⚠ Wipe All Cards');
      clearBtn.addEventListener('click', () => {
        if (clearBtn.dataset.confirm === '1') {
          state.collection = []; state.recentPulls = []; state.totalPacksOpened = 0;
          state.packsAvailable = INITIAL_PACKS; state.lastPackTime = null;
          saveState(); updateNav();
          if (currentView !== 'packs' && currentView !== 'detail') renderView(currentView);
          else { navigate('home'); }
          devToast(toast, 'All card data wiped. Collection reset.');
          clearBtn.textContent = '⚠ Wipe All Cards'; delete clearBtn.dataset.confirm;
        } else {
          clearBtn.dataset.confirm = '1'; clearBtn.textContent = 'Click again to confirm';
          setTimeout(() => { clearBtn.textContent = '⚠ Wipe All Cards'; delete clearBtn.dataset.confirm; }, 3000);
        }
      });
      dataBtns.appendChild(clearBtn);

      const resetBtn = mk('button', 'dev-btn danger', 'Reset Pack Timer');
      resetBtn.addEventListener('click', () => {
        state.lastPackTime = null; saveState();
        devToast(toast, 'Pack timer reset.');
      });
      dataBtns.appendChild(resetBtn);

      dataSec.appendChild(dataBtns); panel.appendChild(dataSec);
      panel.appendChild(toast);
      overlay.appendChild(panel);
      document.body.appendChild(overlay);
    }

    function devToast(el, msg) {
      el.textContent = '> ' + msg;
      el.style.opacity = '1';
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.style.opacity = '0'; }, 3500);
    }


    /* ══════════════════════════════════════════════
       SETTINGS SYSTEM
    ══════════════════════════════════════════════ */
    const SETTINGS_KEY = 'specimen-settings-v1';
    const SETTINGS_DEFAULTS = {
      shellWidth: 720,   // desktop shell max-width px
      fontSize: 13,    // base font size px
      gridColsDesk: 3,     // collection grid cols on desktop
      gridColsMob: 2,     // collection grid cols on mobile
      photoRatio: 52,    // card photo % of card height
      cardRadius: 12,    // card border-radius px
      accentHue: 171,   // HSL hue for accent colour (171 = teal)
    };

    let userSettings = { ...SETTINGS_DEFAULTS };

    function loadSettings() {
      try {
        const d = localStorage.getItem(SETTINGS_KEY);
        if (d) userSettings = { ...SETTINGS_DEFAULTS, ...JSON.parse(d) };
      } catch (_) { }
    }

    function saveSettings() {
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(userSettings)); } catch (_) { }
    }

    function applySettings() {
      const s = userSettings;
      const acc = `hsl(${s.accentHue},100%,39%)`;
      // zoom scales every px-based value uniformly — the only reliable way
      // to resize a page where all sizes are hardcoded in px.
      // Base font size is 13px, so zoom = desired/13.
      const zoom = (s.fontSize / 13).toFixed(4);

      let css = `
    :root{ --acc:${acc}; }
    #shell{max-width:${s.shellWidth}px;zoom:${zoom}}
    #bottom-nav{zoom:${zoom}}
    .scard-photo{flex-basis:${s.photoRatio}%}
    .scard-body{flex-basis:${100 - s.photoRatio}%}
    .scard{border-radius:${s.cardRadius}px}
    .detail-card{border-radius:${s.cardRadius + 2}px}
    .card-grid{grid-template-columns:repeat(${s.gridColsMob},1fr)}
    .poke-summary-grid{grid-template-columns:repeat(${s.gridColsMob},1fr)}
    @media(min-width:768px){
      #shell{max-width:${s.shellWidth}px}
      #bottom-nav{max-width:${s.shellWidth}px}
      #pts-bar{max-width:${s.shellWidth}px}
      .dev-panel{max-width:${s.shellWidth}px}
      .card-grid{grid-template-columns:repeat(${s.gridColsDesk},1fr)}
      .poke-summary-grid{grid-template-columns:repeat(${s.gridColsDesk},1fr)}
    }
  `;
      let el = document.getElementById('usr-style');
      if (!el) { el = document.createElement('style'); el.id = 'usr-style'; document.head.appendChild(el); }
      el.textContent = css;
    }

    // Convert HSL hue (100% sat, given light%) to "r,g,b" string for rgba()
    function hslToRgb(h, s, l) {
      s /= 100; l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
      return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)].join(',');
    }

    function resetSettings() {
      userSettings = { ...SETTINGS_DEFAULTS };
      saveSettings();
      applySettings();
      renderSettings();
    }

    /* ── RENDER SETTINGS VIEW ───────────────────────────────────── */
    function renderSettings() {
      const host = document.getElementById('view-host'); host.innerHTML = '';
      const v = mk('div', 'view');
      v.appendChild(mk('div', 'h-page', 'Settings'));

      function section(title) {
        const s = mk('div', 'settings-section');
        s.appendChild(mk('div', 'settings-section-title', title));
        return s;
      }

      // Helper: stepper control
      function stepper(min, max, step, val, unit, onChange) {
        const wrap = mk('div', 'stepper');
        const minus = mk('button', 'stepper-btn', '−');
        const display = mk('div', 'stepper-val', val + (unit || ''));
        const plus = mk('button', 'stepper-btn', '+');
        minus.addEventListener('click', () => {
          const nv = Math.max(min, parseFloat(display.textContent) - step);
          display.textContent = nv + (unit || ''); onChange(nv);
        });
        plus.addEventListener('click', () => {
          const nv = Math.min(max, parseFloat(display.textContent) + step);
          display.textContent = nv + (unit || ''); onChange(nv);
        });
        wrap.appendChild(minus); wrap.appendChild(display); wrap.appendChild(plus);
        return wrap;
      }

      // Helper: segment control
      function segment(options, current, onChange) {
        const wrap = mk('div', 'seg');
        options.forEach(([val, label]) => {
          const btn = mk('button', 'seg-btn' + (val === current ? ' active' : ''), label);
          btn.addEventListener('click', () => {
            wrap.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            onChange(val);
          });
          wrap.appendChild(btn);
        });
        return wrap;
      }

      // Helper: slider
      function slider(min, max, step, val, unit, onChange) {
        const wrap = mk('div', 'setting-control');
        const inp = document.createElement('input');
        inp.type = 'range'; inp.className = 'setting-slider';
        inp.min = min; inp.max = max; inp.step = step; inp.value = val;
        const lbl = mk('span', 'slider-val', val + (unit || ''));
        inp.addEventListener('input', () => {
          lbl.textContent = inp.value + (unit || '');
          onChange(Number(inp.value));
        });
        wrap.appendChild(inp); wrap.appendChild(lbl);
        return wrap;
      }

      // Helper: row
      function row(labelText, descText, control) {
        const r = mk('div', 'setting-row');
        const left = mk('div');
        left.appendChild(mk('div', 'setting-label', labelText));
        if (descText) left.appendChild(mk('div', 'setting-desc', descText));
        r.appendChild(left); r.appendChild(control);
        return r;
      }

      // ── Layout ──────────────────────────────────────────────────
      const layoutSec = section('Layout');
      layoutSec.appendChild(row('Shell Width', 'Desktop max width',
        slider(480, 1400, 20, userSettings.shellWidth, 'px', v => { userSettings.shellWidth = v; saveSettings(); applySettings(); })
      ));
      layoutSec.appendChild(row('Collection Columns', 'Desktop grid',
        stepper(1, 6, 1, userSettings.gridColsDesk, '', v => { userSettings.gridColsDesk = v; saveSettings(); applySettings(); })
      ));
      layoutSec.appendChild(row('Mobile Columns', 'Mobile grid',
        stepper(1, 3, 1, userSettings.gridColsMob, '', v => { userSettings.gridColsMob = v; saveSettings(); applySettings(); })
      ));
      v.appendChild(layoutSec);

      // ── Cards ───────────────────────────────────────────────────
      const cardSec = section('Cards');
      cardSec.appendChild(row('Photo Size', '% of card height',
        slider(30, 70, 1, userSettings.photoRatio, '%', v => { userSettings.photoRatio = v; saveSettings(); applySettings(); })
      ));
      cardSec.appendChild(row('Corner Radius', '',
        slider(0, 24, 2, userSettings.cardRadius, 'px', v => { userSettings.cardRadius = v; saveSettings(); applySettings(); })
      ));
      v.appendChild(cardSec);

      // ── Typography ──────────────────────────────────────────────
      const typeSec = section('Typography');
      typeSec.appendChild(row('Font Size', 'Base size for all text',
        segment([[11, 'S'], [13, 'M'], [15, 'L'], [17, 'XL']], userSettings.fontSize, v => { userSettings.fontSize = v; saveSettings(); applySettings(); })
      ));
      v.appendChild(typeSec);

      // ── Accent Colour ───────────────────────────────────────────
      const colSec = section('Accent Colour');
      colSec.appendChild(row('Hue', 'Shifts the accent colour',
        slider(0, 360, 1, userSettings.accentHue, '°', v => { userSettings.accentHue = v; saveSettings(); applySettings(); })
      ));
      // Colour preview swatch
      const swatch = mk('div');
      swatch.id = 'acc-swatch';
      swatch.style.cssText = 'width:100%;height:28px;border-radius:6px;margin-top:-6px;margin-bottom:12px;transition:background .15s';
      swatch.style.background = `hsl(${userSettings.accentHue},100%,39%)`;
      // Keep swatch live as slider moves
      const origApply = applySettings;
      colSec.appendChild(swatch);
      v.appendChild(colSec);

      // ── Data: Import / Export ───────────────────────────────────
      const dataSec = section('Data');
      const ieStat = mk('div', 'ie-status', '');

      const ieRow = mk('div', 'ie-btn-row');

      const expBtn = mk('button', 'btn btn-ghost', '⬇ Export');
      expBtn.title = 'Download all cards and settings as a JSON file';
      expBtn.addEventListener('click', () => {
        exportData();
        ieStat.className = 'ie-status ok';
        ieStat.textContent = `✓ Exported ${state.collection.length} cards`;
        setTimeout(() => { ieStat.textContent = ''; }, 4000);
      });
      ieRow.appendChild(expBtn);

      // Hidden file input — triggered by import button
      const fileInput = document.createElement('input');
      fileInput.type = 'file'; fileInput.accept = '.json'; fileInput.style.display = 'none';
      fileInput.addEventListener('change', () => importData(fileInput.files[0], ieStat));
      document.body.appendChild(fileInput);

      const impBtn = mk('button', 'btn btn-ghost', '⬆ Import');
      impBtn.title = 'Load a previously exported JSON backup';
      impBtn.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });
      ieRow.appendChild(impBtn);

      const ieWrap = mk('div', 'ie-section');
      const ieDesc = mk('div', 'setting-desc', 'Export saves all cards + settings to a JSON file you can import on any device.');
      ieDesc.style.marginBottom = '8px';
      ieWrap.appendChild(ieDesc);
      ieWrap.appendChild(ieRow);
      ieWrap.appendChild(ieStat);
      dataSec.appendChild(ieWrap);
      v.appendChild(dataSec);

      // ── Reset ───────────────────────────────────────────────────
      const resetBtn = mk('button', 'btn btn-ghost settings-reset', 'Reset Visual Defaults');
      resetBtn.addEventListener('click', resetSettings);
      v.appendChild(resetBtn);

      host.appendChild(v);

      // Patch slider inputs to also update the swatch live
      v.querySelectorAll('.setting-slider').forEach(inp => {
        inp.addEventListener('input', () => {
          const sw = document.getElementById('acc-swatch');
          if (sw) sw.style.background = `hsl(${userSettings.accentHue},100%,39%)`;
        });
      });
    }


    /* ── IMPORT / EXPORT ─────────────────────────────────────────── */
    function exportData() {
      const payload = {
        version: 2,
        exportedAt: new Date().toISOString(),
        state: {
          collection: state.collection,
          recentPulls: state.recentPulls,
          packsAvailable: state.packsAvailable,
          lastPackTime: state.lastPackTime,
          totalPacksOpened: state.totalPacksOpened,
        },
        settings: userSettings,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `specimen-backup-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file, statusEl) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const payload = JSON.parse(e.target.result);
          if (!payload.state || !Array.isArray(payload.state.collection))
            throw new Error('Invalid file format');
          // Restore state
          state = { ...state, ...payload.state };
          saveState();
          // Restore settings if present
          if (payload.settings) {
            userSettings = { ...SETTINGS_DEFAULTS, ...payload.settings };
            saveSettings();
            applySettings();
          }
          updateNav();
          if (currentView === 'settings') renderSettings();
          else renderView(currentView);
          statusEl.className = 'ie-status ok';
          statusEl.textContent = `✓ Imported ${state.collection.length} cards successfully`;
        } catch (err) {
          statusEl.className = 'ie-status err';
          statusEl.textContent = `✗ ${err.message}`;
        }
      };
      reader.readAsText(file);
    }

    loadSettings(); applySettings(); loadState(); updateNav(); renderView('home'); setInterval(tickTimer, 1000);
  </script>
</body>
