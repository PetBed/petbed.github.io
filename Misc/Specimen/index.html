<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SPECIMEN — A Living Field Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #030b12;
      --surf0: #061120;
      --surf1: #091829;
      --surf2: #0c2038;
      --surf3: #0f2847;
      --acc: #00c9a7;
      --acc2: #5e6ad2;
      --acc3: #e8763a;
      --text: #cde8f5;
      --text2: #5f9ab8;
      --text3: #234e6a;
      --border: #0d2840;
      --nav-h: 64px;
      --fd: 'Cinzel', serif;
      --fm: 'IBM Plex Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--fm);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none
    }

    #shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative
    }

    #view-host {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + 12px);
      scroll-behavior: smooth
    }

    #view-host::-webkit-scrollbar {
      display: none
    }

    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--nav-h);
      background: rgba(6, 17, 32, .96);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-family: var(--fm);
      position: relative;
      transition: color .2s
    }

    .nav-btn.active {
      color: var(--acc)
    }

    .nav-btn:not(.active):hover {
      color: var(--text2)
    }

    .nav-btn .ni {
      font-size: 16px;
      line-height: 1
    }

    .nav-btn .nl {
      font-size: 8.5px;
      text-transform: uppercase;
      letter-spacing: .12em
    }

    .nav-badge {
      position: absolute;
      top: 8px;
      right: calc(50% - 18px);
      background: var(--acc);
      color: var(--bg);
      font-size: 8px;
      font-weight: 700;
      border-radius: 8px;
      min-width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px
    }

    .view {
      padding: 18px 14px;
      animation: fade-in .25s ease
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .h-display {
      font-family: var(--fd);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .2em
    }

    .h-section {
      font-family: var(--fd);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 10px
    }

    .h-page {
      font-family: var(--fd);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .18em;
      margin-bottom: 18px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fm);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .1em;
      cursor: pointer;
      border: none;
      border-radius: 7px;
      padding: 10px 22px;
      transition: filter .15s, transform .1s, opacity .15s
    }

    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px)
    }

    .btn:active {
      transform: none;
      filter: none
    }

    .btn-acc {
      background: var(--acc);
      color: var(--bg)
    }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border)
    }

    .btn-ghost:hover {
      border-color: var(--acc2);
      color: var(--acc2)
    }

    .btn-lg {
      padding: 13px 32px;
      font-size: 13px
    }

    .btn-block {
      width: 100%
    }

    /* HERO */
    .hero-card {
      background: linear-gradient(140deg, var(--surf1) 0%, var(--surf2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      position: relative;
      overflow: hidden;
      margin-bottom: 14px
    }

    .hero-card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 55% 50% at 15% 65%, rgba(0, 201, 167, .08), transparent)
    }

    .hero-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 3px
    }

    .hero-icon {
      font-size: 22px;
      filter: drop-shadow(0 0 9px var(--acc))
    }

    .hero-title {
      font-family: var(--fd);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: .4em;
      color: var(--acc);
      text-shadow: 0 0 28px rgba(0, 201, 167, .3)
    }

    .hero-tagline {
      font-size: 9.5px;
      color: var(--text2);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-left: 32px;
      margin-bottom: 18px
    }

    .hero-pack-row {
      display: flex;
      align-items: center;
      gap: 18px
    }

    .pack-num-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px
    }

    .pack-num {
      font-family: var(--fd);
      font-size: 46px;
      line-height: 1;
      color: var(--acc)
    }

    .pack-num-lbl {
      font-size: 8px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .1em
    }

    .cooldown-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px
    }

    .cd-lbl {
      font-size: 8.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .1em
    }

    .cd-time {
      font-family: var(--fd);
      font-size: 24px;
      color: var(--acc2)
    }

    .rarity-pills {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 14px;
      scrollbar-width: none
    }

    .rarity-pills::-webkit-scrollbar {
      display: none
    }

    .rp {
      flex-shrink: 0;
      min-width: 60px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--surf1);
      border: 1px solid var(--rp-b, var(--border));
      text-align: center
    }

    .rp-num {
      display: block;
      font-family: var(--fd);
      font-size: 18px;
      color: var(--rp-c, var(--text2))
    }

    .rp-lbl {
      display: block;
      font-size: 7.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 1px
    }

    .stat-chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px
    }

    .stat-chip {
      background: var(--surf1);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 6px;
      text-align: center
    }

    .sc-num {
      display: block;
      font-family: var(--fd);
      font-size: 20px;
      margin-bottom: 2px
    }

    .sc-lbl {
      display: block;
      font-size: 7.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .07em
    }

    .section-row {
      margin-bottom: 20px
    }

    .hscroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none
    }

    .hscroll .scard {
      width: 190px;
      flex-shrink: 0
    }

    .hscroll::-webkit-scrollbar {
      display: none
    }

    .onboard {
      margin-top: 20px;
      padding: 16px;
      background: var(--surf1);
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--text2);
      font-size: 11.5px;
      line-height: 1.85
    }

    .onboard p+p {
      margin-top: 6px
    }

    /* SPECIES CARD — playing card ratio 5:7, one template used everywhere */
    .scard {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(160deg, var(--surf2), var(--surf3));
      border: 1px solid var(--scard-b, var(--border));
      transition: transform .22s, box-shadow .22s;
      flex-shrink: 0;
      width: 100%;
      aspect-ratio: 5/7;
      display: flex;
      flex-direction: column;
    }

    .scard:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px var(--scard-g, transparent)
    }

    /* Rarity colour bar across top */
    .scard-pip {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--scard-c, var(--text3));
      z-index: 3
    }

    /* Photo: top 52% of card */
    .scard-photo {
      flex: 0 0 52%;
      position: relative;
      overflow: hidden
    }

    .scard-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .scard-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fd);
      font-size: 26px;
      color: var(--scard-c, var(--text3));
      opacity: .2;
      background: var(--surf1);
    }

    /* Rarity badge overlaid on photo bottom-right */
    .scard-rar-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      z-index: 2;
      font-size: 6.5px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--scard-c);
      background: rgba(0, 0, 0, .75);
      padding: 2px 5px;
      border-radius: 3px;
      border: 1px solid var(--scard-b);
    }

    /* Body: lower 48% */
    .scard-body {
      flex: 1;
      padding: 6px 8px 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .scard-name {
      font-size: 10.5px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--scard-c, var(--text));
      text-transform: capitalize;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
      flex-shrink: 0;
    }

    .scard-sci {
      font-size: 7.5px;
      font-style: italic;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
      flex-shrink: 0;
    }

    .scard-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 4px;
      flex-shrink: 0
    }

    .scard-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      justify-content: flex-start;
      overflow: hidden
    }

    .scard-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 7.5px;
      line-height: 1.3
    }

    .scard-row-key {
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text3);
      flex-shrink: 0;
      margin-right: 4px
    }

    .scard-row-val {
      color: var(--text2);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0
    }

    /* Chips row — country, date, group, rarity, IUCN */
    .scard-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: auto;
      padding-top: 5px;
      flex-shrink: 0
    }

    .scard-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 7px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      background: rgba(0, 0, 0, .25);
      border: 1px solid var(--border);
      color: var(--text2);
      white-space: nowrap;
    }

    .scard-chip.iucn {
      border-color: var(--scard-b);
      color: var(--scard-c)
    }

    /* Shimmer on hover */
    .scard-shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .055), transparent);
      transform: skewX(-20deg);
      pointer-events: none;
      z-index: 4
    }

    .scard:hover .scard-shimmer {
      animation: shimmer .55s ease forwards
    }

    @keyframes shimmer {
      to {
        left: 155%
      }
    }

    /* PACK OPENING */
    .pack-opening-view {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      flex-direction: column;
      padding: 18px 14px
    }

    .pre-open {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 22px;
      text-align: center;
      padding: 40px 0
    }

    .pack-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--acc);
      animation: float 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 22px var(--acc))
    }

    .pack-icon svg {
      width: 100%;
      height: 100%
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-11px)
      }
    }

    .pre-open-title {
      font-family: var(--fd);
      font-size: 18px;
      letter-spacing: .15em
    }

    .pre-open-sub {
      font-size: 11px;
      color: var(--text2)
    }

    .pack-remaining-badge {
      font-size: 9.5px;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 20px
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 18px;
      text-align: center
    }

    .loader-ring {
      width: 50px;
      height: 50px;
      border: 2px solid var(--border);
      border-top-color: var(--acc);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .load-txt {
      font-size: 12.5px;
      color: var(--text2);
      letter-spacing: .1em
    }

    .load-sub {
      font-size: 10px;
      color: var(--text3)
    }

    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center
    }

    .err-icon {
      font-size: 44px
    }

    .err-msg {
      font-size: 11.5px;
      color: var(--acc3);
      max-width: 280px;
      line-height: 1.7
    }

    .reveal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .reveal-title {
      font-family: var(--fd);
      font-size: 15px;
      letter-spacing: .16em
    }

    .reveal-prog {
      font-size: 11px;
      color: var(--text2)
    }

    .reveal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 22px
    }

    .card-back {
      height: 192px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surf1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fd);
      font-size: 36px;
      color: var(--text3)
    }

    .reveal-slot.revealed {
      animation: pop-in .42s cubic-bezier(.34, 1.56, .64, 1) both
    }

    @keyframes pop-in {
      from {
        transform: scale(.55) rotateY(90deg);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .post-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 260px;
      margin: 0 auto
    }

    /* COLLECTION */
    .col-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px
    }

    .col-badge {
      font-size: 11px;
      color: var(--text2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 10px
    }

    .filter-panel {
      margin-bottom: 16px
    }

    .search-input {
      width: 100%;
      padding: 9px 12px;
      font-family: var(--fm);
      font-size: 11.5px;
      background: var(--surf1);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      outline: none;
      margin-bottom: 8px;
      transition: border-color .15s
    }

    .search-input::placeholder {
      color: var(--text3)
    }

    .search-input:focus {
      border-color: var(--acc)
    }

    .filter-row {
      display: flex;
      gap: 8px
    }

    .filter-sel {
      flex: 1;
      padding: 7px 6px;
      font-family: var(--fm);
      font-size: 9.5px;
      background: var(--surf1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      outline: none;
      cursor: pointer;
      appearance: none;
      transition: border-color .15s
    }

    .filter-sel:focus {
      border-color: var(--acc)
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 11.5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px
    }

    /* DETAIL — full-width card, all content inside */
    .back-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-family: var(--fm);
      font-size: 10.5px;
      letter-spacing: .1em;
      cursor: pointer;
      margin-bottom: 16px;
      padding: 4px 0;
      transition: color .15s;
      display: block
    }

    .back-btn:hover {
      color: var(--acc)
    }

    .detail-card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--detail-b, var(--border));
      background: var(--surf1);
      box-shadow: 0 0 48px var(--detail-g, transparent);
    }

    .detail-photo {
      position: relative;
      width: 100%;
      height: 260px;
      background: var(--surf2);
      overflow: hidden
    }

    .detail-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .detail-photo-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fd);
      font-size: 80px;
      color: var(--detail-c, var(--text3));
      opacity: .13
    }

    .detail-rar-tag {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 8.5px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--detail-c);
      background: rgba(0, 0, 0, .75);
      border: 1px solid var(--detail-b);
      padding: 4px 10px;
      border-radius: 4px
    }

    .detail-body {
      padding: 20px
    }

    .detail-name {
      font-family: var(--fd);
      font-size: 20px;
      text-transform: capitalize;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.2
    }

    .detail-sci {
      font-style: italic;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 18px
    }

    .detail-tax {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px
    }

    .detail-tax td {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px
    }

    .detail-tax-key {
      color: var(--text3);
      width: 76px;
      letter-spacing: .04em
    }

    .detail-tax-val {
      color: var(--text2)
    }

    .detail-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px
    }

    .detail-chip {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 5px;
      background: var(--surf2);
      border: 1px solid var(--border);
      color: var(--text2)
    }

    /* STATS */
    .stats-chips {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-bottom: 22px
    }

    .stats-chip {
      background: var(--surf1);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center
    }

    .stc-num {
      display: block;
      font-family: var(--fd);
      font-size: 26px;
      margin-bottom: 3px
    }

    .stc-lbl {
      display: block;
      font-size: 7.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .bar-list {
      margin-bottom: 24px
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
      font-size: 10.5px
    }

    .bar-label {
      min-width: 90px;
      color: var(--bar-c, var(--text2))
    }

    .bar-track {
      flex: 1;
      height: 5px;
      background: var(--surf1);
      border-radius: 3px;
      overflow: hidden
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--bar-c, var(--acc));
      transition: width 1.1s cubic-bezier(.22, 1, .36, 1)
    }

    .bar-count {
      min-width: 26px;
      text-align: right;
      color: var(--text2)
    }

    .hidden {
      display: none !important
    }

    /* ── CARD STACK REVEAL ── */
    .poke-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
      flex: 1;
      width: 100%
    }

    .poke-progress {
      font-family: var(--fd);
      font-size: 10px;
      letter-spacing: .22em;
      color: var(--text2);
      text-transform: uppercase;
      transition: opacity .2s
    }

    /* The stage is exactly one card tall. All cards sit at 0,0 stacked by z-index. */
    .poke-stage {
      position: relative;
      width: 210px;
      height: 294px;
      margin: 0 auto
    }

    .poke-slot {
      position: absolute;
      top: 0;
      left: 0;
      width: 210px;
      height: 294px;
      cursor: pointer
    }

    .poke-slot .scard {
      width: 210px;
      border-radius: 14px;
      cursor: pointer;
      flex-shrink: 0
    }

    /* Sweep: top card flies off to the upper-right */
    .poke-slot.sweeping {
      animation: card-sweep .38s cubic-bezier(.4, 0, 1, 1) forwards;
      pointer-events: none
    }

    @keyframes card-sweep {
      to {
        transform: translateX(140%) translateY(-18%) rotate(18deg);
        opacity: 0
      }
    }

    /* Rarity label */
    .poke-hint {
      font-family: var(--fd);
      font-size: 12px;
      letter-spacing: .22em;
      text-align: center;
      height: 20px;
      line-height: 20px
    }

    .poke-hint.pop {
      animation: rar-pop .35s cubic-bezier(.34, 1.56, .64, 1) both
    }

    @keyframes rar-pop {
      from {
        transform: scale(.65);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    /* Tap cue */
    .poke-tap {
      font-size: 10px;
      letter-spacing: .14em;
      color: var(--text3);
      text-align: center;
      animation: hint-pulse 1.9s ease-in-out infinite
    }

    @keyframes hint-pulse {

      0%,
      100% {
        opacity: .3
      }

      50% {
        opacity: .85
      }
    }

    .poke-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 260px
    }

    .poke-summary-header {
      font-family: var(--fd);
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--text2);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px
    }

    .poke-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
      margin-bottom: 20px
    }

    /* ── DEV MODE ── */
    .dev-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, .75);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fade-in .18s ease
    }

    .dev-panel {
      width: 100%;
      max-width: 480px;
      background: #020e08;
      border-top: 2px solid #00ff88;
      padding: 22px 18px 32px;
      font-family: var(--fm)
    }

    .dev-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px
    }

    .dev-title {
      font-family: var(--fd);
      font-size: 12px;
      letter-spacing: .22em;
      color: #00ff88
    }

    .dev-subtitle {
      font-size: 9px;
      color: #1a6b3a;
      letter-spacing: .1em;
      margin-top: 2px
    }

    .dev-close {
      background: none;
      border: 1px solid #1a6b3a;
      color: #1a6b3a;
      font-family: var(--fm);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all .15s
    }

    .dev-close:hover {
      border-color: #00ff88;
      color: #00ff88
    }

    .dev-section {
      margin-bottom: 16px
    }

    .dev-section-lbl {
      font-size: 8.5px;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: #1a6b3a;
      margin-bottom: 8px
    }

    .dev-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .dev-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: transparent;
      color: #00ff88;
      font-family: var(--fm);
      font-size: 11px;
      cursor: pointer;
      transition: background .15s, color .15s;
      letter-spacing: .06em
    }

    .dev-btn:hover {
      background: #00ff88;
      color: #020e08
    }

    .dev-btn.danger {
      border-color: #ff4455;
      color: #ff4455
    }

    .dev-btn.danger:hover {
      background: #ff4455;
      color: #fff
    }

    .dev-toast {
      font-size: 9.5px;
      color: #00ff88;
      margin-top: 8px;
      min-height: 14px;
      letter-spacing: .08em
    }

    @media(min-width:768px) {
      #shell {
        max-width: 720px
      }

      #bottom-nav {
        max-width: 720px
      }

      .dev-panel {
        max-width: 720px
      }

      .card-grid {
        grid-template-columns: repeat(3, 1fr)
      }

      .poke-summary-grid {
        grid-template-columns: repeat(3, 1fr)
      }

      .poke-stage {
        width: 260px;
        height: 364px
      }

      .poke-slot {
        width: 260px;
        height: 364px
      }

      .poke-slot .scard {
        width: 260px
      }

      .hscroll .scard {
        width: 220px
      }
    }

    /* ── SETTINGS VIEW ── */
    .settings-section {
      margin-bottom: 28px
    }

    .settings-section-title {
      font-family: var(--fd);
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border)
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px
    }

    .setting-label {
      font-size: 11px;
      color: var(--text);
      flex-shrink: 0;
      min-width: 110px
    }

    .setting-desc {
      font-size: 8.5px;
      color: var(--text3);
      margin-top: 1px
    }

    .setting-control {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0
    }

    /* Stepper: − value + */
    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden
    }

    .stepper-btn {
      background: var(--surf1);
      border: none;
      color: var(--text2);
      width: 28px;
      height: 28px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
      flex-shrink: 0
    }

    .stepper-btn:hover {
      background: var(--surf2);
      color: var(--acc)
    }

    .stepper-val {
      min-width: 36px;
      text-align: center;
      font-family: var(--fd);
      font-size: 11px;
      color: var(--text);
      padding: 0 4px;
      background: var(--surf2);
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border)
    }

    /* Segment control */
    .seg {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden
    }

    .seg-btn {
      background: var(--surf1);
      border: none;
      color: var(--text3);
      font-family: var(--fm);
      font-size: 9.5px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap
    }

    .seg-btn+.seg-btn {
      border-left: 1px solid var(--border)
    }

    .seg-btn.active {
      background: var(--acc);
      color: var(--bg);
      font-weight: 700
    }

    /* Slider */
    .setting-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: var(--surf3);
      outline: none;
      cursor: pointer
    }

    .setting-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--acc);
      cursor: pointer
    }

    .setting-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--acc);
      cursor: pointer;
      border: none
    }

    .slider-val {
      font-family: var(--fd);
      font-size: 10px;
      color: var(--text2);
      min-width: 32px;
      text-align: right
    }

    .settings-reset {
      margin-top: 8px
    }

    /* Import / Export */
    .ie-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px
    }

    .ie-btn-row {
      display: flex;
      gap: 10px
    }

    .ie-status {
      font-size: 9px;
      letter-spacing: .08em;
      color: var(--text3);
      min-height: 14px;
      margin-top: -4px
    }

    .ie-status.ok {
      color: var(--acc)
    }

    .ie-status.err {
      color: #ff4455
    }

    /* Dev mode mobile unlock flash */
    .nav-btn.dev-flash {
      animation: dev-flash-anim .6s ease forwards
    }

    @keyframes dev-flash-anim {
      0% {
        color: var(--text3)
      }

      20% {
        color: #00ff88;
        text-shadow: 0 0 12px #00ff88, 0 0 24px #00ff88
      }

      50% {
        color: #00ff88;
        text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88
      }

      100% {
        color: var(--acc);
        text-shadow: none
      }
    }

    .nav-btn.dev-armed .ni {
      animation: dev-pulse 1.2s ease-in-out infinite
    }

    @keyframes dev-pulse {

      0%,
      100% {
        opacity: .5;
        transform: scale(1)
      }

      50% {
        opacity: 1;
        transform: scale(1.18);
        color: #00ff88
      }
    }

    /* Floating settings button */
    #settings-fab {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 150;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(9, 24, 41, .88);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0;
      transition: border-color .2s, box-shadow .2s;
      color: var(--text3);
    }

    #settings-fab:hover {
      border-color: var(--acc);
      box-shadow: 0 0 12px rgba(0, 201, 167, .2);
      color: var(--acc)
    }

    #settings-fab.active {
      border-color: var(--acc);
      color: var(--acc)
    }

    #settings-fab.dev-flash {
      animation: dev-flash-anim .6s ease forwards
    }

    /* Points award card */
    .pts-card {
      position: absolute;
      top: 0;
      left: 0;
      width: 210px;
      height: 294px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(145deg, #0a1f0e, #0f2d18);
      border: 2px solid var(--acc);
      box-shadow: 0 0 32px rgba(0, 201, 167, .28);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      padding: 24px;
      z-index: 99;
    }

    .pts-card-bg {
      position: absolute;
      inset: 0;
      opacity: .07;
      background: repeating-linear-gradient(60deg, transparent, transparent 18px, var(--acc) 18px, var(--acc) 19px);
    }

    .pts-orb {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, rgba(0, 255, 170, .45), rgba(0, 180, 120, .15) 55%, transparent 75%);
      border: 2px solid rgba(0, 201, 167, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 0 28px rgba(0, 201, 167, .3);
      animation: orb-pulse 2.4s ease-in-out infinite;
    }

    @keyframes orb-pulse {

      0%,
      100% {
        box-shadow: 0 0 28px rgba(0, 201, 167, .3)
      }

      50% {
        box-shadow: 0 0 44px rgba(0, 201, 167, .55)
      }
    }

    .pts-num {
      font-family: var(--fd);
      font-size: 34px;
      font-weight: 700;
      color: var(--acc);
      line-height: 1;
      text-shadow: 0 0 18px rgba(0, 201, 167, .6)
    }

    .pts-label-top {
      font-family: var(--fd);
      font-size: 9px;
      letter-spacing: .28em;
      color: rgba(0, 201, 167, .7);
      text-transform: uppercase
    }

    .pts-title {
      font-family: var(--fd);
      font-size: 13px;
      letter-spacing: .18em;
      color: var(--acc);
      text-shadow: 0 0 10px rgba(0, 201, 167, .4)
    }

    .pts-sub {
      font-size: 8px;
      color: rgba(0, 201, 167, .55);
      letter-spacing: .1em
    }

    .pts-total {
      font-size: 8px;
      letter-spacing: .1em;
      color: rgba(0, 201, 167, .45);
      border-top: 1px solid rgba(0, 201, 167, .15);
      padding-top: 8px;
      width: 100%;
      text-align: center;
    }

    .pts-card-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 210px;
      height: 294px;
      z-index: 99;
      cursor: pointer
    }

    .pts-card-wrap.sweeping {
      animation: card-sweep .38s cubic-bezier(.4, 0, 1, 1) forwards;
      pointer-events: none
    }

    @media(min-width:768px) {

      .pts-card,
      .pts-card-wrap {
        width: 260px;
        height: 364px
      }

      .pts-orb {
        width: 108px;
        height: 108px
      }

      .pts-num {
        font-size: 42px
      }
    }

    /* Points bar — fixed top strip */
    #pts-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 32px;
      z-index: 140;
      background: rgba(6, 17, 32, .95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: var(--fd);
      font-size: 10px;
      letter-spacing: .16em;
      color: var(--text2);
    }

    #pts-bar-num {
      color: var(--acc);
      font-size: 12px;
      letter-spacing: .1em
    }

    #pts-bar svg {
      opacity: .7
    }

    /* Push view content down so it's not under the bar */
    #view-host {
      padding-top: 32px
    }

    /* Settings FAB shifts down */
    #settings-fab {
      top: 44px
    }

    @media(min-width:768px) {
      #pts-bar {
        max-width: 720px
      }
    }

    /* Shop */
    /* ── Shared pack visual component ── */
    .pack-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px
    }

    /* Physical pack shape */
    .pv {
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      border-radius: 7px;
      overflow: hidden;
      transition: transform .22s cubic-bezier(.34, 1.56, .64, 1), box-shadow .22s;
      /* aspect-ratio approximates a booster pack: ~2.2 : 3.5 */
      aspect-ratio: 22/35;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .45);
    }

    .pv:hover {
      transform: translateY(-4px) rotate(-0.8deg);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .5)
    }

    .pv.pv-disabled {
      opacity: .38;
      cursor: not-allowed;
      filter: saturate(.3)
    }

    .pv.pv-disabled:hover {
      transform: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .45)
    }

    /* Seal strip — top */
    .pv-seal-top {
      flex-shrink: 0;
      height: 18px;
      background: var(--pv-seal);
      /* scalloped bottom edge: semicircles cut upward from below */
      -webkit-mask: radial-gradient(circle at 6px 150%, transparent 5px, black 5.5px) repeat-x bottom/12px 12px, linear-gradient(black, black) top/100% calc(100% - 6px) no-repeat;
      mask: radial-gradient(circle at 6px 150%, transparent 5px, black 5.5px) repeat-x bottom/12px 12px, linear-gradient(black, black) top/100% calc(100% - 6px) no-repeat;
    }

    /* Perforation line */
    .pv-perf {
      flex-shrink: 0;
      height: 3px;
      background: repeating-linear-gradient(90deg, var(--pv-perf) 0, var(--pv-perf) 5px, transparent 5px, transparent 9px);
      opacity: .55;
    }

    /* Pack body */
    .pv-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 10px;
      background: var(--pv-bg);
      position: relative;
      overflow: hidden;
    }

    /* Diagonal gloss sheen */
    .pv-body::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -30%;
      width: 60%;
      height: 180%;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, .07) 50%, transparent 60%);
      pointer-events: none;
    }

    /* Subtle texture lines */
    .pv-body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(165deg, transparent, transparent 14px, rgba(0, 0, 0, .06) 14px, rgba(0, 0, 0, .06) 15px);
      pointer-events: none;
    }

    .pv-icon {
      width: 42px;
      height: 42px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pv-c);
      filter: drop-shadow(0 0 8px var(--pv-glow));
    }

    .pv-icon svg {
      width: 100%;
      height: 100%
    }

    .pv-name {
      font-family: var(--fd);
      font-size: 9.5px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--pv-c);
      text-align: center;
      line-height: 1.3;
      z-index: 1;
      text-shadow: 0 1px 6px rgba(0, 0, 0, .5);
    }

    .pv-sub {
      font-size: 7.5px;
      color: rgba(255, 255, 255, .45);
      letter-spacing: .08em;
      z-index: 1;
      text-align: center;
    }

    /* Count badge */
    .pv-badge {
      position: absolute;
      top: 6px;
      right: 7px;
      z-index: 5;
      font-family: var(--fd);
      font-size: 11px;
      color: var(--pv-c);
      background: rgba(0, 0, 0, .55);
      border: 1px solid var(--pv-c);
      border-radius: 4px;
      padding: 1px 5px;
      line-height: 1.4;
      box-shadow: 0 0 8px var(--pv-glow);
    }

    /* Seal strip — bottom */
    .pv-seal-bot {
      flex-shrink: 0;
      height: 14px;
      background: var(--pv-seal);
      /* scalloped top edge: semicircles cut downward from above */
      -webkit-mask: radial-gradient(circle at 6px -50%, transparent 5px, black 5.5px) repeat-x top/12px 12px, linear-gradient(black, black) bottom/100% calc(100% - 6px) no-repeat;
      mask: radial-gradient(circle at 6px -50%, transparent 5px, black 5.5px) repeat-x top/12px 12px, linear-gradient(black, black) bottom/100% calc(100% - 6px) no-repeat;
    }

    /* Shop-specific */
    .shop-pts-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surf1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 11px;
    }

    .shop-pts-label {
      color: var(--text2);
      letter-spacing: .06em
    }

    .shop-pts-val {
      font-family: var(--fd);
      font-size: 16px;
      color: var(--acc)
    }

    .shop-toast {
      font-size: 9.5px;
      color: var(--acc);
      margin-bottom: 12px;
      min-height: 16px;
      text-align: center;
      letter-spacing: .08em;
      opacity: 0;
      transition: opacity .2s;
    }

    .shop-toast.show {
      opacity: 1
    }

    /* Pack selector header */
    .pack-select-header {
      font-family: var(--fd);
      font-size: 13px;
      letter-spacing: .18em;
      margin-bottom: 16px;
      color: var(--text)
    }

    @media(min-width:768px) {
      .pack-grid {
        grid-template-columns: repeat(3, 1fr)
      }
    }

    /* Rarity info button on detail view */
    .detail-info-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text3);
      font-family: var(--fm);
      font-size: 9px;
      letter-spacing: .1em;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 12px;
      transition: border-color .15s, color .15s;
    }

    .detail-info-btn:hover {
      border-color: var(--acc);
      color: var(--acc)
    }

    .detail-info-btn svg {
      flex-shrink: 0
    }

    /* Rarity breakdown overlay */
    .rar-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, .72);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fade-in .18s ease;
    }

    .rar-panel {
      width: 100%;
      max-width: 480px;
      background: var(--surf1);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 20px 18px 32px;
      max-height: 82vh;
      overflow-y: auto;
      animation: slide-up .24s cubic-bezier(.22, 1, .36, 1);
    }

    .rar-panel::-webkit-scrollbar {
      display: none
    }

    @keyframes slide-up {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0)
      }
    }

    .rar-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .rar-panel-title {
      font-family: var(--fd);
      font-size: 13px;
      letter-spacing: .18em;
      color: var(--text)
    }

    .rar-panel-close {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      transition: color .15s;
      line-height: 1;
    }

    .rar-panel-close:hover {
      color: var(--text)
    }

    /* Verdict bar */
    .rar-verdict {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--rv-b);
      background: rgba(0, 0, 0, .2);
      margin-bottom: 18px;
    }

    .rar-verdict-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--rv-c);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--rv-c);
    }

    .rar-verdict-text {
      font-size: 10px;
      color: var(--text2);
      line-height: 1.6
    }

    .rar-verdict-rarity {
      font-family: var(--fd);
      font-size: 14px;
      color: var(--rv-c);
      margin-right: 6px
    }

    /* Score bar */
    .rar-score-wrap {
      margin-bottom: 18px
    }

    .rar-score-label {
      font-size: 8.5px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px
    }

    .rar-score-track {
      height: 8px;
      background: var(--surf3);
      border-radius: 4px;
      position: relative;
      overflow: visible;
      margin-bottom: 6px;
    }

    .rar-score-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--rv-c);
      transition: width .8s cubic-bezier(.22, 1, .36, 1)
    }

    .rar-score-ticks {
      display: flex;
      justify-content: space-between;
      font-size: 7px;
      color: var(--text3);
      margin-top: 4px;
      padding: 0 1px
    }

    .rar-score-val {
      text-align: right;
      font-family: var(--fd);
      font-size: 12px;
      color: var(--rv-c);
      margin-top: 4px
    }

    /* Factor rows */
    .rar-factors-title {
      font-size: 8.5px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px
    }

    .rar-factor {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surf2);
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .rar-factor-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline
    }

    .rar-factor-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text2)
    }

    .rar-factor-delta {
      font-family: var(--fd);
      font-size: 11px
    }

    .rar-factor-sub {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px
    }

    .rar-factor-val {
      font-size: 8.5px;
      color: var(--text3)
    }

    .rar-factor-note {
      font-size: 8px;
      color: var(--text3);
      text-align: right;
      flex: 1
    }

    /* Threshold guide */
    .rar-thresholds {
      margin-top: 16px;
      padding: 12px;
      background: var(--surf2);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .rar-thresh-title {
      font-size: 8px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px
    }

    .rar-thresh-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 9px
    }

    .rar-thresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .rar-thresh-name {
      min-width: 64px
    }

    .rar-thresh-range {
      color: var(--text3)
    }

    @media(min-width:768px) {
      .rar-panel {
        max-width: 720px
      }
    }

    /* Collection pagination */
    .col-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      margin-top: 6px;
      gap: 8px;
    }

    .page-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--fm);
      font-size: 10px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      letter-spacing: .06em;
      flex-shrink: 0;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--acc);

    }

      cursor: not-allowed
    }

    .page-info {
      font-size: 9.5px;
      color: var(--text3);
      text-align: center;
      letter-spacing: .08em;
      flex: 1
    }

    .page-info strong {
      color: var(--text2)
    }
  </style>
</head>

          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />

  </div>
  <script>
    const PACK_SIZE = 6, PACK_COOLDOWN_MS = 10 * 60 * 1000, PACK_MAX = 6, INITIAL_PACKS = 3, STORAGE_KEY = 'specimen-v2';
    const RARITY = {
      Common: { c: '#7fa8bb', b: '#2a4d60', g: 'rgba(127,168,187,.12)', label: 'COMMON' },
      Uncommon: { c: '#3fd68a', b: '#115c3a', g: 'rgba(63,214,138,.14)', label: 'UNCOMMON' },
      Rare: { c: '#5aacf5', b: '#1148a8', g: 'rgba(90,172,245,.18)', label: 'RARE' },
      Epic: { c: '#c47cf8', b: '#5c24a8', g: 'rgba(196,124,248,.18)', label: 'EPIC' },
      Legendary: { c: '#f5bf3a', b: '#9c6a08', g: 'rgba(245,191,58,.22)', label: 'LEGENDARY' },
    };
    const RO = ['Legendary', 'Epic', 'Rare', 'Uncommon', 'Common'];
    const IUCN = { EX: { rarity: 'Legendary', label: 'Extinct' }, EW: { rarity: 'Legendary', label: 'Extinct in Wild' }, CR: { rarity: 'Epic', label: 'Critically Endangered' }, EN: { rarity: 'Rare', label: 'Endangered' }, VU: { rarity: 'Uncommon', label: 'Vulnerable' }, NT: { rarity: 'Common', label: 'Near Threatened' }, LC: { rarity: 'Common', label: 'Least Concern' }, DD: { rarity: 'Uncommon', label: 'Data Deficient' } };
    const TAXONS = [{ key: 212, label: 'Birds' }, { key: 359, label: 'Mammals' }, { key: 358, label: 'Reptiles' }, { key: 131, label: 'Amphibians' }, { key: 204, label: 'Fish' }, { key: 216, label: 'Insects' }, { key: 6160, label: 'Plants' }, { key: 5, label: 'Fungi' }];
    const SPECIAL_PACK_COST = 150;
    const SPECIAL_PACKS = [
      { id: 'mammals', label: 'Mammals', icon: '🦊', taxonKey: 359, color: '#c47cf8', border: '#5c24a8' },
      { id: 'avians', label: 'Avians', icon: '🦅', taxonKey: 212, color: '#5aacf5', border: '#1148a8' },
      { id: 'reptiles', label: 'Reptiles', icon: '🦎', taxonKey: 358, color: '#3fd68a', border: '#115c3a' },
      { id: 'amphibians', label: 'Amphibians', icon: '🐸', taxonKey: 131, color: '#f5bf3a', border: '#9c6a08' },
      { id: 'fish', label: 'Fish', icon: '🐟', taxonKey: 204, color: '#60d4f5', border: '#0e7490' },
      { id: 'arthropods', label: 'Arthropods', icon: '🦋', taxonKey: 216, color: '#fb923c', border: '#c2410c' },
      { id: 'mollusks', label: 'Mollusks', icon: '🐚', taxonKey: 52, color: '#f472b6', border: '#9d174d' },
      { id: 'annelids', label: 'Annelids', icon: '🪱', taxonKey: 240, color: '#a3e635', border: '#3f6212' },
      { id: 'cnidarians', label: 'Cnidarians', icon: '🪸', taxonKey: 43, color: '#f87171', border: '#991b1b' },
      { id: 'echinoderms', label: 'Echinoderms', icon: '⭐', taxonKey: 1914, color: '#fde68a', border: '#92400e' },
      { id: 'fungi', label: 'Fungi & Moss', icon: '🍄', taxonKey: 5, color: '#86efac', border: '#166534' },
    ];
    /* ── Pack icons — Lucide-style 24×24 stroke SVGs ── */
    const PACK_ICONS = (() => {
      const S = (w, body) =>
        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ` +
        `stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
      const sw = '1.6';
      return {
        // 3-D box / crate
        field: S(sw,
          `<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>` +
          `<polyline points="3.27 6.96 12 12 20.73 6.96"/>` +
          `<line x1="12" y1="22" x2="12" y2="12"/>`),
        // Paw print
        mammals: S(sw,
          `<circle cx="11" cy="4" r="2"/>` +
          `<circle cx="18" cy="8" r="2"/>` +
          `<circle cx="20" cy="16" r="2"/>` +
          `<path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.05Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>`),
        // Bird in flight
        avians: S(sw,
          `<path d="M16 7h.01"/>` +
          `<path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/>` +
          `<path d="m20 7 2 .5-2 .5"/>` +
          `<path d="M10 18v3"/>` +
          `<path d="M14 17.75V21"/>` +
          `<path d="M7 18a6 6 0 0 0 3.84-10.61"/>`),
        // S-curve snake with small head circle
        reptiles: S(sw,
          `<path d="M5 7c0-2.8 2.2-5 5-5s5 2.2 5 5-2.2 5-5 5 5 2.2 5 5-2.2 3-5 3"/>` +
          `<circle cx="5" cy="7" r="1.5" fill="currentColor"/>`),
        // Frog face: dome body, two bulging eye circles, curved mouth
        amphibians: S(sw,
          `<path d="M7 9C7 5.7 9.2 3 12 3s5 2.7 5 6v4c0 3.3-2.2 6-5 6s-5-2.7-5-6V9z"/>` +
          `<circle cx="9.5" cy="9" r="1.2" fill="currentColor"/>` +
          `<circle cx="14.5" cy="9" r="1.2" fill="currentColor"/>` +
          `<path d="M10 15c.6.6 1.4.9 2 .9s1.4-.3 2-.9"/>`),
        // Simple fish: oval body + forked tail
        fish: S(sw,
          `<ellipse cx="10" cy="12" rx="6" ry="4"/>` +
          `<path d="M16 12l5-4v8l-5-4z"/>` +
          `<circle cx="8" cy="11" r=".6" fill="currentColor"/>`),
        // Insect / bug: segmented body + antennae + 6 legs
        arthropods: S(sw,
          `<path d="m8 2 1.88 1.88"/>` +
          `<path d="M14.12 3.88 16 2"/>` +
          `<path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/>` +
          `<path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6z"/>` +
          `<line x1="12" y1="11" x2="12" y2="20"/>` +
          `<path d="M6 13H2"/><path d="M22 13h-4"/>` +
          `<path d="M6.53 9C4.6 8.8 3 7.1 3 5"/>` +
          `<path d="M20.97 5c0 2.1-1.6 3.8-3.5 4"/>` +
          `<path d="M3 21c0-2.1 1.7-3.9 3.8-4"/>` +
          `<path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/>`),
        // Spiral nautilus shell
        mollusks: S(sw,
          `<path d="M12 12m-1 0a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/>` +
          `<path d="M12 12m-3.5 0a3.5 3.5 0 1 0 7 0 3.5 3.5 0 0 0-7 0"/>` +
          `<path d="M12 8.5A7.5 7.5 0 0 1 19.5 16"/>` +
          `<path d="M5 12a7 7 0 0 1 7-7"/>` +
          `<path d="M12 5V2"/>`),
        // Segmented worm: two interlocked ovals + small head
        annelids: S(sw,
          `<path d="M4 14c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4"/>` +
          `<path d="M12 10c0-2.2 1.8-4 4-4s4 1.8 4 4"/>` +
          `<circle cx="20" cy="10" r="1.5" fill="currentColor"/>`),
        // Jellyfish: dome + 5 tentacles
        cnidarians: S(sw,
          `<path d="M4 11a8 8 0 0 1 16 0H4z"/>` +
          `<path d="M7 11c0 4-1.5 7-1.5 9"/>` +
          `<path d="M10 11c0 4-.5 7-.5 9"/>` +
          `<path d="M12 11v9"/>` +
          `<path d="M14 11c0 4 .5 7 .5 9"/>` +
          `<path d="M17 11c0 4 1.5 7 1.5 9"/>`),
        // 5-point star (starfish)
        echinoderms: S(sw,
          `<path d="M12 2l2.6 7.4H22l-6.2 4.8 2.4 7.4L12 17l-6.2 4.6 2.4-7.4L2 9.4h7.4z"/>`),
        // Mushroom: dome cap + stem
        fungi: S(sw,
          `<path d="M12 3a8 8 0 0 1 8 8H4a8 8 0 0 1 8-8z"/>` +
          `<path d="M10 11v6a2 2 0 0 0 4 0v-6"/>` +
          `<path d="M9 14h6"/>`),
      };
    })();



    let state = { collection: [], recentPulls: [], packsAvailable: INITIAL_PACKS, lastPackTime: null, totalPacksOpened: 0, totalPoints: 0, lastPoints: 0, specialPacks: {} };
    function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) { } }
    function loadState() { try { const d = localStorage.getItem(STORAGE_KEY); if (d) state = { ...state, ...JSON.parse(d) }; } catch (_) { } }

    let currentView = 'home', previousView = 'home', selectedCard = null;
    let activePackType = null; // null=normal, else special pack id

    function getTotalPackCount() {
      const special = Object.values(state.specialPacks || {}).reduce((a, b) => a + b, 0);
      return (state.packsAvailable || 0) + special;
    }

    let packPhase = 'idle', packCards = [], revealIdx = 0, packErrMsg = '';
    const COL_PAGE_SIZE = 20;
    let colSearch = '', colRarity = 'All', colClass = 'All', colSort = 'newest', colPage = 0;

    function navigate(v, opts = {}) {
      previousView = currentView; currentView = v;
      if (opts.card) selectedCard = opts.card;
      updateNav(); renderView(v);
    }
    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === currentView));
      const np = document.getElementById('nav-packs');
      const eb = np.querySelector('.nav-badge'); if (eb) eb.remove();
      const totalP = getTotalPackCount();
      if (totalP > 0) { const b = mk('span', 'nav-badge', totalP); np.appendChild(b); }
      const pbn = document.getElementById('pts-bar-num');
      if (pbn) pbn.textContent = state.totalPoints || 0;
      const spv = document.getElementById('shop-pts-val');
      if (spv) spv.textContent = state.totalPoints || 0;
    }

    function assignRarity(ic, rec, globalImageCount) {
      // Direct IUCN mapping takes priority — no score needed
      if (ic && IUCN[ic]) {
        return {
          rarity: IUCN[ic].rarity,
          breakdown: {
            method: 'iucn',
            iucnCode: ic,
            iucnLabel: IUCN[ic].label,
            reason: `IUCN Red List status "${ic} — ${IUCN[ic].label}" directly determines rarity.`,
          }
        };
      }

      // Smart combined score: 0–100, lower = rarer
      let score = 50;
      const factors = [];

      // Factor 1: taxonomic class tendency
      const CLASS_MOD = {
        'Amphibia': -30, 'Chondrichthyes': -22, 'Fungi': -18, 'Reptilia': -14,
        'Mammalia': -10, 'Myxini': -12, 'Cephalaspidomorphi': -12,
        'Aves': +12, 'Insecta': +18, 'Arachnida': +6, 'Actinopterygii': +8,
        'Liliopsida': +8, 'Magnoliopsida': +8, 'Malacostraca': +4,
      };
      const CLASS_NOTE = {
        'Amphibia': 'Most threatened vertebrate class globally',
        'Chondrichthyes': '~30% of sharks & rays are threatened',
        'Fungi': 'Vastly underdocumented kingdom',
        'Reptilia': 'Many species poorly surveyed',
        'Mammalia': 'Moderately threatened class',
        'Myxini': 'Hagfish — poorly known',
        'Cephalaspidomorphi': 'Lampreys — rarely recorded',
        'Aves': 'Most comprehensively surveyed class on Earth',
        'Insecta': 'Extremely abundant and well-documented',
        'Arachnida': 'Generally well-documented',
        'Actinopterygii': 'Bony fish — frequently recorded',
        'Liliopsida': 'Monocots — common and well-studied',
        'Magnoliopsida': 'Dicots — common and well-studied',
        'Malacostraca': 'Crustaceans — reasonably well-recorded',
      };
      const cls = rec?.['class'] || '';
      const cm = CLASS_MOD[cls] || 0;
      score += cm;
      factors.push({
        label: 'Taxonomic class',
        value: cls || 'Unknown',
        delta: cm,
        note: cm !== 0 ? (CLASS_NOTE[cls] || '') : 'No class modifier for this taxon',
      });

      // Factor 2: species-wide image count from GBIF occurrence count API
      // globalImageCount is the total StillImage occurrences for the species across all of GBIF,
      // fetched separately — far more accurate than counting a single occurrence's media array.
      const imgs = globalImageCount ?? 0;
      let imgDelta = 0, imgNote = '';
      const imgFmt = imgs >= 1000 ? `${(imgs / 1000).toFixed(1)}k` : String(imgs);
      if (imgs >= 10000) { imgDelta = 20; imgNote = `${imgFmt} image records — extremely well-documented species`; }
      else if (imgs >= 1000) { imgDelta = 14; imgNote = `${imgFmt} image records — very frequently photographed`; }
      else if (imgs >= 100) { imgDelta = 8; imgNote = `${imgFmt} image records — well-documented`; }
      else if (imgs >= 20) { imgDelta = 3; imgNote = `${imgFmt} image records — moderately observed`; }
      else if (imgs >= 5) { imgDelta = -5; imgNote = `${imgFmt} image records — infrequently photographed`; }
      else if (imgs >= 1) { imgDelta = -14; imgNote = `${imgFmt} image record${imgs !== 1 ? 's' : ''} — rarely photographed across all of GBIF`; }
      else { imgDelta = -18; imgNote = 'No image records found across GBIF — extremely obscure'; }
      score += imgDelta;
      factors.push({
        label: 'Global image records',
        value: `${imgFmt} across GBIF`,
        delta: imgDelta,
        note: imgNote,
      });

      // Factor 3: coordinate precision — GPS accuracy signals recording frequency
      const unc = rec?.coordinateUncertaintyInMeters;
      let coordDelta = 0, coordNote = '', coordVal = 'Not recorded';
      if (unc) {
        coordVal = unc < 1000 ? `${Math.round(unc)}m` : `${(unc / 1000).toFixed(1)}km`;
        if (unc < 100) { coordDelta = 8; coordNote = 'Precise GPS — species frequently recorded in the field'; }
        else if (unc < 1000) { coordDelta = 4; coordNote = 'Good precision — reasonably well-surveyed location'; }
        else if (unc > 50000) { coordDelta = -8; coordNote = 'Very coarse precision — likely an old museum estimate'; }
        else { coordNote = 'Moderate precision'; }
      } else { coordNote = 'No coordinate data'; }
      score += coordDelta;
      factors.push({ label: 'Location precision', value: coordVal, delta: coordDelta, note: coordNote });

      // Factor 4: jitter
      const jitter = Math.round((Math.random() * 26) - 13);
      score += jitter;
      factors.push({ label: 'Natural variance', value: `${jitter > 0 ? '+' : ''}${jitter} pts`, delta: jitter, note: 'Small random offset so same-class species still vary' });

      const finalScore = Math.round(score);
      let rarity;
      if (score < 10) rarity = 'Legendary';
      else if (score < 26) rarity = 'Epic';
      else if (score < 44) rarity = 'Rare';
      else if (score < 62) rarity = 'Uncommon';
      else rarity = 'Common';

      return {
        rarity,
        breakdown: {
          method: 'score',
          baseScore: 50,
          factors,
          finalScore,
          thresholds: { Legendary: '< 10', Epic: '10–25', Rare: '26–43', Uncommon: '44–61', Common: '62+' },
          reason: `Final score ${finalScore} places this card in the ${rarity} tier.`,
        }
      };
    }
    // Pure scientific-name fallback - only used when no vernacular name found
    function sciNameFallback(s) {
      if (!s) return 'Unknown Species';
      const p = s.split(' '), e = p[1] || p[0];
      return e.charAt(0).toUpperCase() + e.slice(1);
    }
    // Fetch English vernacular name from GBIF species API.
    // Returns best English common name string, or null if none found.
    async function fetchEnglishName(speciesKey) {
      if (!speciesKey) return null;
      try {
        const res = await fetch(`https://api.gbif.org/v1/species/${speciesKey}/vernacularNames?limit=20`);
        if (!res.ok) return null;
        const data = await res.json();
        const results = data.results || [];
        // Filter to English only (GBIF uses 'eng' and occasionally 'en')
        const english = results.filter(v => v.language === 'eng' || v.language === 'en');
        if (!english.length) return null;
        // Prefer entries explicitly marked preferred, then first English entry
        const best = english.find(v => v.preferred === true) || english[0];
        const name = best.vernacularName?.trim();
        // Reject empty, non-ASCII, or suspiciously long names
        if (!name || !/^[\x20-\x7E]+$/.test(name) || name.length > 52) return null;
        // Title-case: "great white shark" -> "Great White Shark"
        return name.replace(/\b\w/g, c => c.toUpperCase());
      } catch { return null; }
    }
    function fmtTime(ms) { const s = Math.floor(ms / 1000), m = Math.floor(s / 60); return `${m}:${String(s % 60).padStart(2, '0')}`; }
    function mk(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; }
    function uniq(arr, k) { return [...new Set(arr.map(x => x[k]).filter(Boolean))].sort(); }
    function rarCounts() { return RO.reduce((a, r) => { a[r] = state.collection.filter(c => c.rarity === r).length; return a; }, {}); }

    async function fetchPack(forcedTaxonKey) {
      // If a specific taxon key is forced (special pack), use it for all 3 slots
      let shuffled;
      if (forcedTaxonKey) {
        const g = { key: forcedTaxonKey, label: SPECIAL_PACKS.find(p => p.taxonKey === forcedTaxonKey)?.label || 'Species' };
        shuffled = [g, g, g];
      } else {
        shuffled = [...TAXONS].sort(() => Math.random() - .5).slice(0, 3);
      }

      // Fetch candidates from all 3 groups concurrently
      const groupResults = await Promise.all(shuffled.map(async g => {
        try {
          const off = Math.floor(Math.random() * 400);
          const res = await fetch(`https://api.gbif.org/v1/occurrence/search?mediaType=StillImage&taxonKey=${g.key}&limit=20&offset=${off}&hasCoordinate=true`);
          if (!res.ok) return { g, hits: [] };
          const data = await res.json();
          const seen = new Set(), hits = [];
          for (const r of (data.results || [])) {
            if (hits.length >= 3) break; // up to 3 candidates per group
            if (!r.species || seen.has(r.species)) continue;
            const m = (r.media || []).find(x => x.type === 'StillImage' && x.identifier);
            if (!m) continue;
            seen.add(r.species);
            hits.push({ r, g, m });
          }
          return { g, hits };
        } catch { return { g, hits: [] }; }
      }));

      // Take 2 from each group first, overflow fills remaining slots
      const selected = [], overflow = [];
      for (const { hits } of groupResults) {
        selected.push(...hits.slice(0, 2));
        overflow.push(...hits.slice(2));
      }
      // Shuffle overflow so the fill isn't always group-ordered
      overflow.sort(() => Math.random() - .5);
      while (selected.length < PACK_SIZE && overflow.length) selected.push(overflow.shift());

      if (selected.length < 2) throw new Error('Not enough specimens found. Check your connection and try again.');

      const finalSlice = selected.slice(0, PACK_SIZE);

      // Fetch English vernacular names AND global image counts for all cards in parallel.
      // /v1/occurrence/count returns a plain integer — the total occurrences with StillImage
      // for that species across the entire GBIF database. This is the correct signal for
      // "how well-documented is this species", not the single occurrence's media array.
      async function fetchGlobalImageCount(speciesKey) {
        if (!speciesKey) return 0;
        try {
          // /occurrence/count doesn't support mediaType filtering.
          // The correct approach per GBIF docs is occurrence/search with limit=0,
          // which returns a meta.count without fetching any records.
          const res = await fetch(
            `https://api.gbif.org/v1/occurrence/search?taxonKey=${speciesKey}&mediaType=StillImage&limit=0`
          );
          if (!res.ok) return 0;
          const data = await res.json();
          return typeof data.count === 'number' ? data.count : 0;
        } catch { return 0; }
      }

      const [vernacularNames, globalImageCounts] = await Promise.all([
        Promise.all(finalSlice.map(({ r }) => fetchEnglishName(r.speciesKey || r.taxonKey))),
        Promise.all(finalSlice.map(({ r }) => fetchGlobalImageCount(r.speciesKey || r.taxonKey))),
      ]);

      return finalSlice.map(({ r, g, m }, i) => {
        const { rarity, breakdown } = assignRarity(r.iucnRedListCategory, r, globalImageCounts[i]);
        return {
          uid: `${r.speciesKey || r.taxonKey}-${Date.now()}-${Math.random().toString(36).slice(2)}`,
          name: vernacularNames[i] || sciNameFallback(r.species),
          scientificName: r.species || 'sp.',
          family: r.family || '—', order: r.order || '—',
          class: r.class || g.label, kingdom: r.kingdom || '—', country: r.country || '—',
          iucnStatus: r.iucnRedListCategory || null,
          image: m.identifier,
          rarity,
          rarityBreakdown: breakdown,
          globalImageCount: globalImageCounts[i],
          collectedAt: Date.now(), group: g.label,
        };
      });
    }

      body.appendChild(mk('div', 'scard-sci', card.scientificName || ''));
      body.appendChild(mk('div', 'scard-divider'));

      // Taxonomy rows: Class + Family only (country/group go in chips below)
      const meta = mk('div', 'scard-meta');

      // Chips row — all contextual details
      const chips = mk('div', 'scard-chips');
      function chip(icon, val, extraCls) {

      chip('📅', card.collectedAt ? new Date(card.collectedAt).toLocaleDateString() : null);
      chip('🌐', card.group || card['class']);
      chip('◈', card.rarity);
      if (iucnInfo) {

      w.appendChild(body);
      w.appendChild(mk('div', 'scard-shimmer'));

      if (onClick) w.addEventListener('click', () => onClick(card));

    /* ── Physical pack visual builder ── */

    async function startPack(packDef) {
      // packDef: null = normal pack, else a SPECIAL_PACKS entry
      const isSpecial = !!packDef;
      if (isSpecial) {
        const owned = (state.specialPacks || {})[packDef.id] || 0;
        if (owned <= 0 || packPhase !== 'idle') return;
      } else {
        if (state.packsAvailable <= 0 || packPhase !== 'idle') return;
      }
      packPhase = 'loading'; packCards = []; revealIdx = 0; renderPacks();
      try {
        const cards = await fetchPack(isSpecial ? packDef.taxonKey : null);
        state.collection = [...state.collection, ...cards]; state.recentPulls = cards;
        if (isSpecial) {
          state.specialPacks[packDef.id] = Math.max(0, (state.specialPacks[packDef.id] || 0) - 1);
        } else {
          state.packsAvailable = Math.max(0, state.packsAvailable - 1);
          state.lastPackTime = Date.now(); // always reset so tickTimer counts from now
        }
        state.totalPacksOpened++;
        const pts = 10 + Math.floor(Math.random() * 11);
        state.totalPoints = (state.totalPoints || 0) + pts;
        state.lastPoints = pts;
        saveState(); updateNav();
        const rarSort = ['Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'];
        packCards = cards.sort((a, b) => rarSort.indexOf(a.rarity) - rarSort.indexOf(b.rarity));
        revealIdx = -1;
        packPhase = 'revealing'; renderPacks();
      } catch (err) { packPhase = 'error'; packErrMsg = err.message || 'Network error.'; renderPacks(); }
    }

      const tap = document.getElementById('poke-tap');
      const btn = document.getElementById('poke-next-btn');

      if (revealIdx === -1) {
        // Points card on top
        if (prog) prog.textContent = `Pack #${state.totalPacksOpened}`;
        if (hint) { hint.textContent = ''; hint.style.color = ''; }
        if (tap) tap.textContent = 'tap to open pack';
        if (btn) btn.textContent = 'Open Pack →';
        return;
      }

      const card = packCards[revealIdx];
      if (!card) return;
      const r = RARITY[card.rarity] || RARITY.Common;
      const isLast = revealIdx === total - 1;

      if (prog) prog.textContent = `Card ${revealIdx + 1} of ${total}`;
      if (hint) {
        hint.textContent = card.rarity;
        hint.style.color = r.c;
        hint.classList.remove('pop');
        void hint.offsetWidth;
        hint.classList.add('pop');
      }
      if (tap) tap.textContent = isLast ? 'tap to finish' : 'tap card to reveal';
      if (btn) btn.textContent = isLast ? 'View All Cards' : 'Next →';
    }

    let _sweeping = false; // guard: block all clicks while a sweep animates

    function dismissTopCard() {
      if (_sweeping) return; // hard block — one sweep at a time

      // Handle points card (idx -1)
      if (revealIdx === -1) {
        const pw = document.getElementById('pts-card-wrap');
        if (!pw) return;
        _sweeping = true;
        pw.classList.add('sweeping');
        setTimeout(() => {
          pw.remove();
          revealIdx = 0;
          _sweeping = false;
          updatePackHUD();
        }, 380);
        return;
      }

      // Find the topmost non-sweeping species slot
      const slots = [...document.querySelectorAll('.poke-slot:not(.sweeping)')];
      if (!slots.length) return;
      const top = slots.reduce((a, b) => parseInt(b.style.zIndex) > parseInt(a.style.zIndex) ? b : a);

      _sweeping = true;
      top.classList.add('sweeping');

      // Snapshot revealIdx NOW — it must not change before the timeout fires
      const snappedIdx = revealIdx;
      const isLast = snappedIdx === packCards.length - 1;

      setTimeout(() => {
        top.remove();
        if (isLast) {
          _sweeping = false;
          packPhase = 'done';
          renderPacks();
        } else {
          revealIdx = snappedIdx + 1;
          _sweeping = false;
          updatePackHUD();
        }
      }, 380);
    }

    function buildSel(opts, sel, onChange) {
      const s = mk('select', 'filter-sel');
      opts.forEach(o => { const [val, label] = Array.isArray(o) ? o : [o, o]; const op = mk('option', null, label); op.value = val; if (val === sel) op.selected = true; s.appendChild(op); });
      s.addEventListener('change', e => onChange(e.target.value)); return s;
    }

    function getFiltered() {
      return state.collection.filter(c => {
        if (colRarity !== 'All' && c.rarity !== colRarity) return false;
        if (colClass !== 'All' && c.class !== colClass) return false;
        if (colSearch) { const s = colSearch.toLowerCase(); if (!c.name?.toLowerCase().includes(s) && !c.scientificName?.toLowerCase().includes(s)) return false; }
        return true;
      }).sort((a, b) => {
        if (colSort === 'rarity') return RO.indexOf(a.rarity) - RO.indexOf(b.rarity);
        if (colSort === 'alpha') return (a.scientificName || '').localeCompare(b.scientificName || '');
        return b.collectedAt - a.collectedAt;
      });
    }

    function rebuildGrid(grid, pages) {
      grid.innerHTML = '';
      if (pages) pages.innerHTML = '';

      const filtered = getFiltered();
      if (!filtered.length) {
        const e = mk('div', 'empty-state');
        if (!state.collection.length) {
          e.appendChild(mk('p', null, 'Your collection is empty.'));
          const b = mk('button', 'btn btn-acc', 'Open First Pack');

          e.appendChild(b);
        } else {
          e.appendChild(mk('p', null, 'No species match your filters.'));
        }
        grid.style.display = 'block'; grid.appendChild(e); return;
      }

      const totalPages = Math.ceil(filtered.length / COL_PAGE_SIZE);
      // Clamp colPage in case filters reduced the total
      if (colPage >= totalPages) colPage = totalPages - 1;

      const pageSlice = filtered.slice(colPage * COL_PAGE_SIZE, (colPage + 1) * COL_PAGE_SIZE);

      grid.style.display = '';
      pageSlice.forEach(card => grid.appendChild(buildCard(card, c => navigate('detail', { card: c }))));

      // Scroll collection area back to top on page change
      const vh = document.getElementById('view-host');
      if (vh) vh.scrollTop = 0;

      // Rebuild pagination bar
      if (!pages) return;
      if (totalPages <= 1) { pages.style.display = 'none'; return; }
      pages.style.display = '';

      const prev = mk('button', 'page-btn', '← Prev');
      prev.disabled = colPage === 0;
      prev.addEventListener('click', () => { colPage--; rebuildGrid(grid, pages); });
      pages.appendChild(prev);

      const info = mk('div', 'page-info');
      info.innerHTML = `Page <strong>${colPage + 1}</strong> of <strong>${totalPages}</strong> &nbsp;·&nbsp; ${filtered.length} species`;
      pages.appendChild(info);

      const next = mk('button', 'page-btn', 'Next →');

      next.addEventListener('click', () => { colPage++; rebuildGrid(grid, pages); });

    }

    function tickTimer() {
      // Award packs continuously: every PACK_COOLDOWN_MS one pack, capped at PACK_MAX
      if (state.lastPackTime && state.packsAvailable < PACK_MAX) {
        const elapsed = Date.now() - state.lastPackTime;
        const earned = Math.floor(elapsed / PACK_COOLDOWN_MS);
        if (earned > 0) {
          const added = Math.min(earned, PACK_MAX - state.packsAvailable);
          if (added > 0) {
            state.packsAvailable += added;
            // Advance lastPackTime by the consumed intervals so timer resets cleanly
            state.lastPackTime += added * PACK_COOLDOWN_MS;
            saveState(); updateNav();
            if (currentView === 'home') renderHome();
            if (currentView === 'packs' && packPhase === 'idle') renderPacks();
          }
        }
      }
      // Update countdown display
      if (state.lastPackTime && state.packsAvailable < PACK_MAX) {
        const rem = Math.max(0, PACK_COOLDOWN_MS - ((Date.now() - state.lastPackTime) % PACK_COOLDOWN_MS));
        ['cd-home', 'cd-packs'].forEach(id => { const e = document.getElementById(id); if (e) e.textContent = fmtTime(rem); });
      }
    }

    let settingsTaps = 0, settingsTapTimer = null, devArmed = false;

    const settingsFab = document.getElementById('settings-fab');
    settingsFab.addEventListener('click', () => {
      clearTimeout(settingsTapTimer);
      settingsTaps++;
      if (settingsTaps >= 5) {
        settingsTaps = 0;
        devArmed = true;
        settingsFab.classList.remove('dev-flash');
        void settingsFab.offsetWidth;
        settingsFab.classList.add('dev-flash');
        settingsFab.addEventListener('animationend', () => settingsFab.classList.remove('dev-flash'), { once: true });
        const homeBtn = document.querySelector('.nav-btn[data-view="home"]');
        if (homeBtn) homeBtn.classList.add('dev-armed');
      } else {
        settingsTapTimer = setTimeout(() => { settingsTaps = 0; }, 2000);
      }
      // Navigate to settings view
      settingsFab.classList.toggle('active', currentView !== 'settings');
      if (currentView === 'settings') { navigate(previousView || 'home'); }
      else { navigate('settings'); }
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.view;

        // ── Home tap while armed → open dev panel ──
        if (v === 'home' && devArmed) {
          devArmed = false;
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('dev-armed'));
          if (v === 'packs' && currentView !== 'packs') { packPhase = 'idle'; packCards = []; revealIdx = 0; }
          navigate(v);
          setTimeout(() => { devMode = true; openDevPanel(); }, 120);
